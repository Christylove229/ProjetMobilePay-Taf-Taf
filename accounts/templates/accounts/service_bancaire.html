{% load i18n %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f6f8; color: #222; max-width: 700px; margin-left: auto; margin-right: auto; }
        h1 { color: #0a5c36; font-size: 1.6rem; }
        h2 { color: #0a5c36; font-size: 1.2rem; }
        form p { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { background: #0a5c36; color: white; border: none; padding: 12px 22px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; max-width: 300px; }
        button:hover { background: #084526; }
        a { color: #0a5c36; text-decoration: none; }
        ul { list-style: none; padding: 0; }
        li { background: #eafaf1; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; }
        @media (max-width: 600px) {
            body { padding: 12px; }
            button { width: 100%; max-width: 100%; }
        }
    </style>

    <title>{% trans "Services bancaires" %} - TAF-TAF</title>
</head>
<body>
    <h1>{% trans "Services bancaires" %}</h1>

    {% if messages %}
        <ul>
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">{% trans "Valider" %}</button>
    </form>

    <p><a href="{% url 'tableau_bord' %}">{% trans "Retour au tableau de bord" %}</a></p>
</body>
</html>
